<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Satisfaction Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background: #f8f9fa;
            padding: 10px;
            text-align: center;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #4CAF50;
            font-weight: bold;
        }
        nav a:hover {
            color: #45a049;
        }
        .form-container {
            padding: 30px;
        }
        h1 {
            margin-bottom: 30px;
            color: #4CAF50;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
        button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .prediction {
            margin-top: 30px;
            padding: 20px;
            background: #e8f5e8;
            border-radius: 5px;
            text-align: center;
            border-left: 5px solid #4CAF50;
        }
        .prediction h2 {
            color: #4CAF50;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Customer Flight Distance Predictor</h1>
        </header>
        <nav>
            <a href="/">Home</a> |
            <a href="/about">About</a> |
            <a href="/content">Content</a> |
            <a href="/project">Project</a> |
            <a href="/history">History</a>
        </nav>
        <div class="form-container">
            <form action="/predict" method="post">
                <div class="form-group">
                    <label for="customer_type">👤 Customer Type:</label>
                    <select name="customer_type" id="customer_type" required>
                        <option value="1">Loyal Customer</option>
                        <option value="0">Disloyal Customer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="satisfaction">😊 Satisfaction:</label>
                    <select name="satisfaction" id="satisfaction" required>
                        <option value="0">Neutral or Dissatisfied</option>
                        <option value="1">Satisfied</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="age">🎂 Age:</label>
                    <input type="number" name="age" id="age" required>
                </div>
                <div class="form-group">
                    <label for="inflight_wifi">📶 Inflight wifi service (0-5):</label>
                    <input type="number" name="inflight_wifi" id="inflight_wifi" min="0" max="5" required>
                </div>
                <div class="form-group">
                    <label for="dep_arr_time">⏰ Departure/Arrival time convenient (0-5):</label>
                    <input type="number" name="dep_arr_time" id="dep_arr_time" min="0" max="5" required>
                </div>
                <div class="form-group">
                    <label for="ease_online_booking">💻 Ease of Online booking (0-5):</label>
                    <input type="number" name="ease_online_booking" id="ease_online_booking" min="0" max="5" required>
                </div>
                <div class="form-group">
                    <label for="gate_location">🚪 Gate location (0-5):</label>
                    <input type="number" name="gate_location" id="gate_location" min="0" max="5" required>
                </div>
                <div class="form-group">
                    <label for="dep_delay">⏳ Departure Delay in Minutes:</label>
                    <input type="number" name="dep_delay" id="dep_delay" step="0.1" required>
                </div>
                <button type="submit">🔮 Predict Flight Distance</button>
            </form>
            {% if prediction %}
            <div class="prediction">
                <h2>Predicted Flight Distance: {{ prediction }} miles</h2>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
